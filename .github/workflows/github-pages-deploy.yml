# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "GitHub Pages Deploy"
on:
  push:
    branches:
      - "main"
    paths:
      - "src/**"
      - "astro.config.ts"
      - "package-lock.json"
      - "package.json"
  workflow_dispatch:
concurrency:
  group: "github-pages-deploy"
  cancel-in-progress: false
jobs:
  main:
    name: "Main"
    permissions:
      contents: "read"
      pages: "write"
      id-token: "write"
    runs-on: "ubuntu-latest"
    environment:
      name: "github-pages"
      url: "${{steps.deployment.outputs.page_url}}"
    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@v7"
      - name: "Setup NodeJS"
        uses: "actions/setup-node@v6"
        with:
          node-version: "^24.18.0"
          check-latest: true
      - name: "Get Cache Path"
        shell: "pwsh"
        run: |-
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $True
          [PSCustomObject]$NPMConfig = ConvertFrom-Json -InputObject (
            npm config list --json |
              Join-String -Separator "`n"
          ) -Depth 100
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_NPM_CACHE_PATH_ROOT=$($NPMConfig.cache)" -Confirm:$False -Encoding 'UTF8NoBOM'
      - name: "Load NPM Cache"
        uses: "actions/cache/restore@v6"
        with:
          key: "${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          restore-keys: |-
            ${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/
            ${{runner.os}}/NPM/${{github.run_id}}/
            ${{runner.os}}/NPM/
          path: "${{env.CDV_NPM_CACHE_PATH_ROOT}}"
      - name: "Install Dependencies"
        run: |-
          npm install
      - name: "Build Pages"
        run: |-
          npm run build
      - name: "Configure GitHub Pages"
        uses: "actions/configure-pages@v6"
      - name: "Upload GitHub Pages Artifact"
        uses: "actions/upload-pages-artifact@v5"
        with:
          path: "dist/"
      - name: "Deploy GitHub Pages"
        id: "deployment"
        uses: "actions/deploy-pages@v5"
      - name: "Save NPM Cache"
        if: "${{!cancelled()}}"
        uses: "actions/cache/save@v6"
        with:
          key: "${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          path: "${{env.CDV_NPM_CACHE_PATH_ROOT}}"
